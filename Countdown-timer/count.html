<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
</head>
<body style="background-color: black; color: bisque; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw;">

    <main>

        <section class="timer">

            <h1>⏳ Countdown Timer</h1>
            <p>Set the duration and press Start.</p>

            <div class="time-inputs">

                <div class="input-group">
                    <label for="hours">Hours :</label>
                    <input
                        type="number"
                        id="hours"
                        placeholder="00"
                        min="0">
                </div>
                <br>

                <div class="input-group">
                    <label for="minutes">Minutes :</label>
                    <input
                        type="number"
                        id="minutes"
                        placeholder="00"
                        min="0"
                        max="59">
                </div>
                <br>

                <div class="input-group">
                    <label for="seconds">Seconds :</label>
                    <input
                        type="number"
                        id="seconds"
                        placeholder="00"
                        min="0"
                        max="59">
                </div>
                <br>

            </div>

            <div class="buttons">
                <button id="start">Start</button>
                <button id="pause">Pause</button>
                <button id="reset">Reset</button>
            </div>

            <div class="display">
                <h2>00 : 00 : 00</h2>
            </div>

        </section>

    </main>

</body>
</html>
